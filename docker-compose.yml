services:
  backend:
    build: ./backend
    container_name: stem_backend
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: postgres
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: password123
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials/google-drive-service-account.json
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - postgres
      - neo4j
    volumes:
      - ./backend/app:/app/app
      - ./credentials:/app/credentials:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: stem_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    command: npm run dev -- --host 0.0.0.0

  mongo:
    image: mongo:7
    container_name: stem_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:16
    container_name: stem_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-community
    container_name: stem_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  mongo_data:
  postgres_data:
  neo4j_data:
  neo4j_logs:
